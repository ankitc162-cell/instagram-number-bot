name: Daily Instagram Reel

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore day counter
        id: cache-day
        uses: actions/cache@v4
        with:
          path: day_counter.txt
          key: day-counter-${{ github.run_number }}
          restore-keys: |
            day-counter-

      - name: Read or initialise day counter
        id: day
        run: |
          if [ -f day_counter.txt ]; then
            DAY=$(cat day_counter.txt)
          else
            DAY=1
          fi
          echo "DAY_NUMBER=$DAY" >> $GITHUB_ENV
          echo "Current day: $DAY"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and post reel
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          DAY_NUMBER:             ${{ env.DAY_NUMBER }}
        run: python generate_and_post.py

      - name: Save incremented day counter
        if: success()
        run: |
          NEXT_DAY=$((DAY_NUMBER + 1))
          echo $NEXT_DAY > day_counter.txt
          echo "Next run will be Day $NEXT_DAY"

      - name: Commit day counter update
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add day_counter.txt
          git diff --staged --quiet || git commit -m "chore: increment day counter to $((DAY_NUMBER + 1))"
          git push
